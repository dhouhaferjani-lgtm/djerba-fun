services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: goadventure-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-go_adventure}
      POSTGRES_USER: ${DB_USERNAME:-go_adventure}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-go_adventure}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - goadventure

  # Redis (Cache + Queue)
  redis:
    image: redis:7-alpine
    container_name: goadventure-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '--raw', 'incr', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - goadventure

  # Laravel API
  api:
    build:
      context: .
      dockerfile: apps/laravel-api/Dockerfile.prod
      args:
        - PHP_VERSION=8.4
    container_name: goadventure-api
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_URL=${APP_URL:-https://dev.go-adventure.net}
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-go_adventure}
      - DB_USERNAME=${DB_USERNAME:-go_adventure}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
      - CACHE_STORE=redis
      - SESSION_DRIVER=redis
    volumes:
      # Named volumes only - no bind mounts in production (Docker best practice)
      - storage_data:/var/www/html/storage
      - api_cache:/var/www/html/bootstrap/cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '8001:80'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - goadventure

  # Laravel Horizon (Queue Worker)
  horizon:
    build:
      context: .
      dockerfile: apps/laravel-api/Dockerfile.prod
      args:
        - PHP_VERSION=8.4
    container_name: goadventure-horizon
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan horizon
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-go_adventure}
      - DB_USERNAME=${DB_USERNAME:-go_adventure}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
    volumes:
      # Named volumes only - no bind mounts in production (Docker best practice)
      - storage_data:/var/www/html/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - goadventure

  # Next.js Frontend
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.prod
      args:
        - NODE_ENV=production
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://dev.go-adventure.net/api/v1}
        - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-https://dev.go-adventure.net}
    container_name: goadventure-web
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://dev.go-adventure.net/api/v1}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-https://dev.go-adventure.net}
      - NEXT_PUBLIC_DEFAULT_LOCALE=fr
    depends_on:
      - api
    ports:
      - '3001:3000'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - goadventure

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: goadventure-nginx
    restart: unless-stopped
    # Ports managed by Dokploy's reverse proxy (Traefik)
    # Do not expose ports directly to avoid conflicts
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - storage_data:/var/www/html/storage:ro
    depends_on:
      - api
      - web
    networks:
      - goadventure

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  storage_data:
    driver: local
  api_cache:
    driver: local

networks:
  goadventure:
    driver: bridge
